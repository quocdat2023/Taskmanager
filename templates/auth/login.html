{% extends "base.html" %}

{% block title %}Đăng nhập{% endblock %}

{% block body %}
<div class="auth-wrapper">
    <div class="auth-card fade-in">
        <div class="auth-logo">
            <i class="fas fa-layer-group text-white"></i>
        </div>
        <h2 class="auth-title">EduTask</h2>
        <p class="auth-subtitle">Hệ thống quản lý công việc và học tập</p>

        <form class="auth-form" id="loginForm"
            onsubmit="event.preventDefault(); Auth.login(document.getElementById('username').value, document.getElementById('password').value);">
            <div class="form-group">
                <label for="username">Tên đăng nhập hoặc Email</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"
                        style="border-color: white; color: var(--text-muted);"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control form-control-custom border-start-0" id="username" required
                        placeholder="Nhập tên đăng nhập...">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"
                        style="border-color: white; color: var(--text-muted);"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control form-control-custom border-start-0" id="password"
                        required placeholder="Nhập mật khẩu...">
                </div>
            </div>

            <button type="submit" class="btn-submit mt-4">
                <i class="fas fa-sign-in-alt me-2"></i> Đăng nhập
            </button>
        </form>

        <div class="auth-footer">
            Chưa có tài khoản? <a href="{{ url_for('pages.register_page') }}">Đăng ký ngay</a>
        </div>
    </div>
</div>
{% endblock %}
